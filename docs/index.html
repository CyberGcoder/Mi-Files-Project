<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="0; url=./privacy-policy/">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mi Files Legal</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f8fb;
            --card: #ffffff;
            --text: #122033;
            --muted: #516175;
            --line: #d9e2ec;
            --accent: #126c8a;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(180deg, #eef4f8 0%, var(--bg) 100%);
            color: var(--text);
            padding: 24px;
        }

        main {
            max-width: 720px;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 14px 32px rgba(18, 32, 51, 0.08);
            text-align: center;
        }

        a {
            color: var(--accent);
        }
    </style>
</head>
<body>
<main>
    <h1>Mi Files</h1>
    <p>Redirecting to the privacy policy...</p>
    <p><a href="./privacy-policy/">Open the privacy policy</a></p>
</main>
</body>
</html>
